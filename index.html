<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --accent: #ff4757;
            --accent-hover: #ff6b81;
            --bg: #0a0a0c;
            --card-bg: #16161a;
            --text-main: #ffffff;
            --text-sub: #a0a0a0;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* 全体スタイル */
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg); 
            color: var(--text-main); 
            margin: 0; 
            padding: 0;
            overflow-x: hidden;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }

        /* 18webの名前は削除 (h1タグを非表示または削除) */
        h1 { display: none; }

        /* 検索ボックス */
        .search-box { 
            display: flex; 
            gap: 12px; 
            margin: 20px auto 50px auto; 
            max-width: 800px;
            background: var(--card-bg); 
            padding: 10px; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.05);
            transition: var(--transition);
        }
        .search-box:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(255, 71, 87, 0.2);
        }

        input { 
            flex: 1; 
            padding: 15px 20px; 
            border: none; 
            background: transparent; 
            color: white; 
            font-size: 1rem;
            outline: none;
        }
        input::placeholder { color: #555; }

        button { 
            padding: 10px 30px; 
            background: var(--accent); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 700;
            transition: var(--transition);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        button:hover { 
            background: var(--accent-hover); 
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 71, 87, 0.4);
        }
        
        /* グリッドとカード */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
            gap: 30px; 
            animation: fadeInUp 0.8s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card { 
            background: var(--card-bg); 
            border-radius: 20px; 
            overflow: hidden; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
            transition: var(--transition); 
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.03);
            position: relative;
        }
        .card:hover { 
            transform: translateY(-10px) scale(1.02); 
            border-color: var(--accent);
        }

        .card img { width: 100%; height: 320px; object-fit: cover; transition: var(--transition); }
        .card-info { padding: 20px; }
        .card-title { 
            font-weight: 700; 
            font-size: 0.95rem;
            height: 2.8em; 
            overflow: hidden; 
            display: -webkit-box; 
            -webkit-line-clamp: 2; 
            -webkit-box-orient: vertical; 
            margin-bottom: 8px;
            line-height: 1.4;
        }
        .card-id { color: var(--accent); font-size: 0.75rem; font-weight: bold; }

        /* ローディングアニメーション */
        .status { text-align: center; margin: 40px; color: var(--text-sub); }
        .loader {
            width: 48px; height: 48px;
            border: 5px solid #FFF;
            border-bottom-color: var(--accent);
            border-radius: 50%;
            display: inline-block;
            animation: rotation 1s linear infinite;
        }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* エラーアラート (本格アニメーション) */
        .alert {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: #ff4757; color: white;
            padding: 16px 32px; border-radius: 50px;
            box-shadow: 0 10px 30px rgba(255, 71, 87, 0.4);
            z-index: 9999; display: none;
            font-weight: 700;
            animation: alertAnim 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
        }
        @keyframes alertAnim {
            0% { top: -100px; opacity: 0; }
            100% { top: 20px; opacity: 1; }
        }
        .alert.fade-out {
            animation: alertFadeOut 0.5s ease forwards;
        }
        @keyframes alertFadeOut {
            to { top: -100px; opacity: 0; }
        }

        /* 本格ブックリーダーUI */
        #viewerOverlay { 
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: #000; z-index: 2000; 
            overflow-y: auto; 
        }

        /* リーダー用ツールバー */
        .viewer-toolbar {
            position: fixed; top: 0; left: 0; width: 100%;
            background: rgba(10, 10, 12, 0.8);
            backdrop-filter: blur(20px);
            padding: 15px 25px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 2100; box-sizing: border-box;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            transform: translateY(0); transition: transform 0.3s;
        }
        .viewer-toolbar.hide { transform: translateY(-100%); }

        .toolbar-group { display: flex; gap: 15px; align-items: center; }

        .btn-icon {
            background: rgba(255,255,255,0.1); border: none; color: white;
            padding: 10px 18px; border-radius: 8px; cursor: pointer;
            font-weight: 600; font-size: 0.9rem; transition: 0.2s;
        }
        .btn-icon:hover { background: var(--accent); }

        .viewer-content { max-width: 900px; margin: 80px auto 40px auto; text-align: center; }

        .viewer-image-list img { 
            max-width: 100%; display: block; margin: 0 auto;
            background: #111;
        }

        #viewerTitle { 
            font-size: 1.2rem; white-space: nowrap; overflow: hidden; 
            text-overflow: ellipsis; max-width: 400px; margin: 0;
        }

        /* PDF生成中のプログレス */
        #pdfProgress { display: none; color: var(--accent); font-weight: bold; margin-left: 10px; }

        /* スクロールバー */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="errorAlert" class="alert"></div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="キーワードを入力..." value="A">
        <button onclick="search()">Search</button>
    </div>

    <div id="statusContainer" class="status" style="display:none;">
        <span class="loader"></span>
        <div id="statusText">Loading...</div>
    </div>

    <div class="grid" id="resultGrid"></div>
</div>

<div id="viewerOverlay">
    <div class="viewer-toolbar" id="viewerToolbar">
        <div class="toolbar-group">
            <button class="btn-icon" onclick="closeViewer()">✕ Close</button>
            <h2 id="viewerTitle"></h2>
        </div>
        <div class="toolbar-group">
            <span id="pdfProgress">Generating PDF...</span>
            <button class="btn-icon" onclick="exportPDF()">↓ PDF Save</button>
            <button class="btn-icon" onclick="shareViewer()">Share</button>
        </div>
    </div>
    
    <div class="viewer-content">
        <div id="viewerStatus" class="status"></div>
        <div id="viewerImageList" class="viewer-image-list"></div>
    </div>
</div>

<script>
    const API_URL = 'https://muhoweb-teoj.onrender.com/api/v3/djsearch';
    const MY_PROXY_SERVER = window.location.hostname === 'localhost' 
        ? 'http://localhost:3000/api/proxy-base64' 
        : '/api/proxy-base64';

    let currentImages = [];
    let currentTitle = "";

    function showAlert(msg) {
        const alert = document.getElementById('errorAlert');
        alert.innerText = msg;
        alert.classList.remove('fade-out');
        alert.style.display = 'block';
        setTimeout(() => {
            alert.classList.add('fade-out');
            setTimeout(() => { alert.style.display = 'none'; }, 500);
        }, 4000);
    }

    function toggleLoading(show, text = 'Loading...') {
        const container = document.getElementById('statusContainer');
        const statusText = document.getElementById('statusText');
        container.style.display = show ? 'block' : 'none';
        statusText.innerText = text;
    }

    async function search() {
        const query = document.getElementById('searchInput').value;
        const grid = document.getElementById('resultGrid');
        if (!query) return;
        grid.innerHTML = '';
        toggleLoading(true, 'Accessing Library...');

        try {
            const response = await fetch(`${API_URL}?q=${encodeURIComponent(query)}&page=1`);
            const data = await response.json();
            toggleLoading(false);

            if (data.result && data.result.length > 0) {
                data.result.forEach((item, index) => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.style.animationDelay = `${index * 0.05}s`;
                    card.innerHTML = `
                        <img src="${item.image}" alt="${item.title}" loading="lazy">
                        <div class="card-info">
                            <div class="card-title">${item.title}</div>
                            <div class="card-id">#${item.id.replace('/', '')}</div>
                        </div>
                    `;
                    card.onclick = () => openViewer(item.id, item.rule);
                    grid.appendChild(card);
                });
            } else {
                showAlert('No data found.');
            }
        } catch (error) {
            toggleLoading(false);
            showAlert('Server Connection Failed.');
        }
    }

    async function openViewer(id, rule) {
        const overlay = document.getElementById('viewerOverlay');
        const viewerTitle = document.getElementById('viewerTitle');
        const viewerStatus = document.getElementById('viewerStatus');
        const viewerImageList = document.getElementById('viewerImageList');

        overlay.style.display = 'block';
        document.body.style.overflow = 'hidden';
        viewerImageList.innerHTML = '';
        viewerTitle.innerText = 'Syncing...';
        viewerStatus.innerHTML = '<span class="loader"></span><br>Decrypting Base64 Data...';

        const targetUrl = `https://momon-ga.com/fanzine/${id}`;
        const finalUrl = `${MY_PROXY_SERVER}?url=${encodeURIComponent(targetUrl)}`;

        try {
            const response = await fetch(finalUrl);
            const data = await response.json();

            viewerStatus.innerHTML = '';
            currentTitle = data.title;
            viewerTitle.innerText = data.title;
            currentImages = data.images;
            
            if (data.images && data.images.length > 0) {
                data.images.forEach((base64Data) => {
                    const newImg = document.createElement('img');
                    newImg.src = base64Data;
                    viewerImageList.appendChild(newImg);
                });
            } else {
                viewerStatus.innerText = "Empty Data.";
            }
        } catch (error) {
            viewerStatus.innerText = "Access Denied.";
            showAlert('Proxy refuse connection.');
        }
    }

    // PDF保存機能
    async function exportPDF() {
        if (currentImages.length === 0) return;
        const progress = document.getElementById('pdfProgress');
        progress.style.display = 'inline';
        
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('p', 'mm', 'a4');
        const pageWidth = pdf.internal.pageSize.getWidth();
        const pageHeight = pdf.internal.pageSize.getHeight();

        for (let i = 0; i < currentImages.length; i++) {
            const img = new Image();
            img.src = currentImages[i];
            await new Promise(resolve => img.onload = resolve);

            const imgProps = pdf.getImageProperties(img);
            const ratio = imgProps.width / imgProps.height;
            const pdfImgHeight = pageWidth / ratio;

            if (i > 0) pdf.addPage();
            pdf.addImage(img, 'WEBP', 0, 0, pageWidth, pdfImgHeight);
        }

        pdf.save(`${currentTitle.substring(0, 20)}.pdf`);
        progress.style.display = 'none';
        showAlert('PDF Saved successfully.');
    }

    // 共有機能
    async function shareViewer() {
        if (navigator.share) {
            try {
                await navigator.share({
                    title: currentTitle,
                    text: `Check out this content: ${currentTitle}`,
                    url: window.location.href
                });
            } catch (err) {
                showAlert('Share canceled.');
            }
        } else {
            navigator.clipboard.writeText(window.location.href);
            showAlert('Link copied to clipboard.');
        }
    }

    function closeViewer() {
        document.getElementById('viewerOverlay').style.display = 'none';
        document.body.style.overflow = 'auto';
        currentImages = [];
    }

    // ツールバーの自動表示・非表示
    let lastScrollTop = 0;
    document.getElementById('viewerOverlay').addEventListener('scroll', function() {
        let st = this.scrollTop;
        const toolbar = document.getElementById('viewerToolbar');
        if (st > lastScrollTop && st > 100) {
            toolbar.classList.add('hide');
        } else {
            toolbar.classList.remove('hide');
        }
        lastScrollTop = st;
    });

    window.onload = search;
</script>

</body>
</html>
