<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Momon-ga Combined Viewer</title>
    <style>
        /* 検索画面のスタイル */
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #0f0f0f; color: #e0e0e0; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { text-align: center; font-weight: 300; letter-spacing: 2px; color: #ffffff; margin-bottom: 30px; }
        
        .search-box { display: flex; gap: 10px; margin-bottom: 30px; background: #1a1a1a; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        input { flex: 1; padding: 12px 15px; border: 1px solid #333; border-radius: 8px; background: #252525; color: #fff; outline: none; }
        input:focus { border-color: #ff4757; }
        button { padding: 10px 25px; background: #ff4757; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #ff6b81; transform: translateY(-1px); }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 25px; }
        .card { background: #1a1a1a; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: all 0.3s ease; cursor: pointer; border: 1px solid #222; }
        .card:hover { transform: translateY(-8px); border-color: #ff4757; box-shadow: 0 8px 20px rgba(255,71,87,0.2); }
        .card img { width: 100%; height: 280px; object-fit: cover; border-bottom: 1px solid #222; }
        .card-info { padding: 15px; font-size: 0.9em; }
        .card-title { font-weight: 600; height: 2.8em; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; margin-bottom: 8px; color: #fff; line-height: 1.4; }
        .status { text-align: center; margin: 40px; color: #888; font-size: 1.1em; }

        /* ビューア用の追加スタイル */
        #viewerOverlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(5,5,5,0.98); z-index: 1000; overflow-y: auto; color: white; padding-top: 60px;
        }
        .viewer-content { max-width: 1000px; margin: 0 auto; text-align: center; padding: 0 20px 50px; }
        .close-btn { position: fixed; top: 20px; right: 30px; font-size: 40px; cursor: pointer; z-index: 1001; color: #ff4757; transition: 0.2s; }
        .close-btn:hover { color: #fff; }
        .viewer-image-list img { max-width: 100%; margin-bottom: 20px; border-radius: 4px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #viewerTitle { font-weight: 300; border-bottom: 1px solid #333; margin-bottom: 30px; padding-bottom: 15px; color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <h1>Momon-ga 検索ボード</h1>
    
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="キーワードを入力 (例: A, タイツ...)" value="にゃ">
        <button onclick="search()">検索</button>
    </div>

    <div id="status" class="status"></div>
    <div class="grid" id="resultGrid"></div>
</div>

<div id="viewerOverlay">
    <span class="close-btn" onclick="closeViewer()">&times;</span>
    <div class="viewer-content">
        <h2 id="viewerTitle"></h2>
        <div id="viewerStatus" class="status" style="color: #aaa;"></div>
        <div id="viewerImageList" class="viewer-image-list"></div>
    </div>
</div>

<script>
    const MY_API_SEARCH = '/api/search';
    const MY_API_DETAILS = '/api/proxy-details';

    // 検索機能
    async function search() {
        const query = document.getElementById('searchInput').value;
        const grid = document.getElementById('resultGrid');
        const status = document.getElementById('status');

        if (!query) return;

        grid.innerHTML = '';
        status.innerText = '読み込み中...';

        try {
            const response = await fetch(`${MY_API_SEARCH}?q=${encodeURIComponent(query)}`);
            const data = await response.json();

            status.innerText = '';

            if (data.result && data.result.length > 0) {
                data.result.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <img src="${item.image}" alt="${item.title}" loading="lazy">
                        <div class="card-info">
                            <div class="card-title">${item.title}</div>
                            <small style="color:#555">ID: ${item.id}</small>
                        </div>
                    `;
                    card.onclick = () => openViewer(item.id, item.rule);
                    grid.appendChild(card);
                });
            } else {
                status.innerText = '結果が見つかりませんでした。';
            }
        } catch (error) {
            console.error(error);
            status.innerText = 'エラーが発生しました。';
        }
    }

    // ビューア機能
    async function openViewer(id, rule) {
        const overlay = document.getElementById('viewerOverlay');
        const viewerTitle = document.getElementById('viewerTitle');
        const viewerStatus = document.getElementById('viewerStatus');
        const viewerImageList = document.getElementById('viewerImageList');

        overlay.style.display = 'block';
        document.body.style.overflow = 'hidden';
        viewerImageList.innerHTML = '';
        viewerTitle.innerText = '読み込み中...';
        viewerStatus.innerText = "データを取得しています。少々お待ちください...";

        const targetUrl = `https://momon-ga.com/fanzine/${id}`;
        const finalUrl = `${MY_API_DETAILS}?url=${encodeURIComponent(targetUrl)}`;

        try {
            const response = await fetch(finalUrl);
            const data = await response.json();

            viewerTitle.innerText = data.title;
            
            if (data.images && data.images.length > 0) {
                data.images.forEach(proxyUrl => {
                    const newImg = document.createElement('img');
                    newImg.src = proxyUrl;
                    viewerImageList.appendChild(newImg);
                });
                viewerStatus.innerText = `完了: ${data.images.length} 枚の画像を表示中`;
            } else {
                viewerStatus.innerText = "画像が見つかりませんでした。";
            }

        } catch (error) {
            console.error(error);
            viewerStatus.innerText = "エラー: データの取得に失敗しました。";
        }
    }

    function closeViewer() {
        document.getElementById('viewerOverlay').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    window.onload = search;
</script>

</body>
</html>
